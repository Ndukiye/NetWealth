services:
  postgres:
    image: postgres:16-alpine
    container_name: netwealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: netwealth
      POSTGRES_PASSWORD: netwealth
      POSTGRES_DB: netwealth
    ports:
      - "5432:5432"
    volumes:
      - netwealth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netwealth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  netwealth-postgres-data:
